spring.application.name=demo
server.port=8081

# Keycloak realm
keycloak.base-url=http://172.21.33.114:9443
keycloak.realm=pygmalion_viewer

# Vue / application client. Used to read client roles from JWT.
keycloak.app-client-id=TestClient
# Required when TestClient is confidential. Set it as an environment variable.
keycloak.client-secret=CWfV0rOKNG33OVAhQcjRIqhxl6MDiaTW



# Internal client used by the backend for access-token logout.
# Give this client's service account the required Keycloak user/session logout permission.
# If omitted, the app client id/secret are used.
# keycloak.admin-client-id=spring-admin-service
# keycloak.admin-client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}

# Spring Boot validates user access tokens from this realm.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://172.21.33.114:9443/realms/pygmalion_viewer

# PostgreSQL database used by the facilities API.
spring.datasource.url=jdbc:postgresql://localhost:5432/vr_view_db
spring.datasource.username=postgres
spring.datasource.password=12345

# Local storage path for POST /files uploaded binaries.
files.storage-directory=uploads/files

# MinIO object storage used by POST /files and GET /files/{fileId}.
# Use the API endpoint, not the browser console URL.
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin123
minio.bucket=vr-view-bucket
