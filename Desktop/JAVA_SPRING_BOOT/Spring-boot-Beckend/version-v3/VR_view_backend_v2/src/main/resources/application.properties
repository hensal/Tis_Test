spring.application.name=demo
server.port=8081

# Keycloak realm
keycloak.base-url=http://localhost:8080
keycloak.realm=pygmalion_viewer

# Vue / application client. Used to read client roles from JWT.
keycloak.app-client-id=TestClient

# Service-account admin client is not required for client-side role reading.
# If you do not need admin APIs, leave these values commented out or remove them.
# keycloak.admin-client-id=spring-admin-service
# keycloak.admin-client-secret=aZ3kr3kQ8g36av2VIpXbGWV8INK8deqN

# Spring Boot validates user access tokens from this realm.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/pygmalion_viewer